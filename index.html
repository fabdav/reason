<form id="submissionForm">  <label>MIPS:</label>  <input type="number" id="mips" name="mips" required><br><label>SKU:</label><input type="number" id="sku" name="sku" required><br><button type="button" onclick="submitForm(0)">Gift</button><button type="button" onclick="submitForm(1)">Self</button></form><script>  const supabase = supabase.createClient('https://pcqyfctdcowbqifulacq.supabase.co', 'sb_publishable_M_V_NoeE6ZF1HNf1twnSvg_aMdDiTCC');  async function submitForm(typeValue) {    // 1. Get values    const mips = document.getElementById('mips').value;    const sku = document.getElementById('sku').value;    // 2. Validate mandatory fields    if (!mips || !sku) {      alert("Please fill in MIPS and SKU");      return;    }    // 3. Send to Supabase    const { error } = await supabase.from('DB').insert({      mips: mips,      sku: sku,      type: typeValue    });    if (error) {      alert('Error: ' + error.message);    } else {      alert('Saved!');      // 4. Clear SKU but keep MIPS      document.getElementById('sku').value = '';      document.getElementById('sku').focus();    }  }
