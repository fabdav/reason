<!DOCTYPE html><html><head>  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body>  <h3>Submission Form</h3>  <form id="submissionForm">    <label>MIPS:</label>    <input type="number" id="mips" name="mips" required>    <br><br>    <label>SKU:</label>    <input type="number" id="sku" name="sku" required>    <br><br>    <button type="button" onclick="submitForm(0)">Gift</button>    <button type="button" onclick="submitForm(1)">Self</button>  </form>  <script>    const supabase = supabase.createClient(      'https://pcqyfctdcowbqifulacq.supabase.co',       'sb_publishable_M_V_NoeE6ZF1HNf1twnSvg_aMdDiTCC'    );    async function submitForm(typeValue) {      const mips = document.getElementById('mips').value;      const sku = document.getElementById('sku').value;      if (!mips || !sku) {        alert("Please fill in MIPS and SKU");        return;      }      console.log("Attempting to save:", { mips, sku, type: typeValue });      // Send to Supabase      const { data, error } = await supabase.from('DB').insert([        { mips: mips, sku: sku, type: typeValue }      ]);      if (error) {        // This will pop up a box if something is wrong (like a policy error)        alert('CRITICAL ERROR: ' + error.message);        console.error("Supabase Error:", error);      } else {        alert('Success! Data saved to database.');        document.getElementById('sku').value = '';        document.getElementById('sku').focus();      }    }  </script></body></html>
