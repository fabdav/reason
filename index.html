<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2?v=2"></script>
</head>
<body>
  <strong>Version: 1.3</strong>
  <form id="submissionForm">
    <label>MIPS:</label> <input type="number" id="mips" required><br>
    <label>SKU:</label> <input type="number" id="sku" required><br>
    <button type="button" onclick="submitForm(0)">Gift</button>
    <button type="button" onclick="submitForm(1)">Self</button>
  </form>

  <script>
    // Using a fresh variable name 'supabaseClient'
    const supabaseClient = supabase.createClient(
      'https://pcqyfctdcowbqifulacq.supabase.co', 
      'sb_publishable_M_V_NoeE6ZF1HNf1twnSvg_aMdDiTCC'
    );

    async function submitForm(typeValue) {
      const mips = document.getElementById('mips').value;
      const sku = document.getElementById('sku').value;
      
      const { error } = await supabaseClient.from('DB').insert({
        mips: mips,
        sku: sku,
        type: typeValue
      });

      if (error) {
        alert('Database Error: ' + error.message);
      } else {
        alert('Success!');
        document.getElementById('sku').value = '';
      }
    }
  </script>
</body>
</html>
