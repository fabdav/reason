<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2?v=2"></script>
  <style>
    /* Styling the buttons */
    .btn {
      padding: 15px 30px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 10px;
      transition: background-color 0.3s;
      color: white;
    }
    .gift-btn { background-color: #ff4757; }
    .self-btn { background-color: #2ed573; }
    
    /* Adding a hover effect */
    .btn:hover { opacity: 0.8; transform: scale(1.05); }
    
    /* Making input fields bigger */
    input { padding: 10px; font-size: 16px; width: 200px; }
  </style>
</head>
<body>
  <strong>Version: 1.4</strong>
  <h3>Submission Form</h3>
  <form id="submissionForm">
    <label>MIPS:</label><br>
    <input type="number" id="mips" required><br><br>
    <label>SKU:</label><br>
    <input type="number" id="sku" required><br><br>
    
    <button type="button" class="btn gift-btn" onclick="submitForm(0)">Gift</button>
    <button type="button" class="btn self-btn" onclick="submitForm(1)">Self</button>
  </form>

  <script>
    const supabaseClient = supabase.createClient(
      'https://pcqyfctdcowbqifulacq.supabase.co', 
      'sb_publishable_M_V_NoeE6ZF1HNf1twnSvg_aMdDiTCC'
    );

    async function submitForm(typeValue) {
      const mips = document.getElementById('mips').value;
      const sku = document.getElementById('sku').value;
      
      const { error } = await supabaseClient.from('DB').insert({
        mips: mips,
        sku: sku,
        type: typeValue
      });

      if (error) {
        alert('Database Error: ' + error.message);
      } else {
        alert('Success!');
        document.getElementById('sku').value = '';
      }
    }
  </script>
</body>
</html>
