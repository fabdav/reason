<!DOCTYPE html><html><head>  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body>  <form id="submissionForm">    <label>MIPS:</label>    <input type="number" id="mips" name="mips" required>    <br>    <label>SKU:</label>    <input type="number" id="sku" name="sku" required>    <br>    <button type="button" onclick="submitForm(0)">Gift</button>    <button type="button" onclick="submitForm(1)">Self</button>  </form>  <script>    // 2. Initialize Supabase once    const supabase = supabase.createClient(      'https://pcqyfctdcowbqifulacq.supabase.co',       'sb_publishable_M_V_NoeE6ZF1HNf1twnSvg_aMdDiTCC'    );    // 3. Your function logic    async function submitForm(typeValue) {      const mips = document.getElementById('mips').value;      const sku = document.getElementById('sku').value;      if (!mips || !sku) {        alert("Please fill in MIPS and SKU");        return;      }      const { error } = await supabase.from('DB').insert({        mips: mips,        sku: sku,        type: typeValue      });      if (error) {        alert('Error: ' + error.message);      } else {        alert('Saved!');        document.getElementById('sku').value = '';        document.getElementById('sku').focus();      }    }  </script></body></html>
