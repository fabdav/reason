<!DOCTYPE html><html><head>  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body>  <div style="font-family: sans-serif; color: #888; font-size: 14px; margin-bottom: 20px;">    <strong>Version: 1.1</strong>  </div>  <h3>Submission Form</h3>  <form id="submissionForm">    <label>MIPS:</label>    <input type="number" id="mips" name="mips" required>    <br><br>    <label>SKU:</label>    <input type="number" id="sku" name="sku" required>    <br><br>    <button type="button" onclick="submitForm(0)">Gift</button>    <button type="button" onclick="submitForm(1)">Self</button>  </form>  <script>    // Initialize Supabase    const supabase = supabase.createClient(      'https://pcqyfctdcowbqifulacq.supabase.co',       'sb_publishable_M_V_NoeE6ZF1HNf1twnSvg_aMdDiTCC'    );    async function submitForm(typeValue) {      const mips = document.getElementById('mips').value;      const sku = document.getElementById('sku').value;      if (!mips || !sku) {        alert("Please fill in MIPS and SKU");        return;      }      const { error } = await supabase.from('DB').insert([        { mips: mips, sku: sku, type: typeValue }      ]);      if (error) {        // If this fails, the browser console will show exactly why (policy/table/etc)        alert('Error: ' + error.message);      } else {        alert('Success! Saved to DB.');        document.getElementById('sku').value = '';        document.getElementById('sku').focus();      }    }  </script></body></html>
